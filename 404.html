<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page not found · Elżbieta Bojarczuk</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .nf {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .nf-mark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-display);
      font-weight: 900;
      font-size: 42vw;
      line-height: 1;
      color: var(--c-ink);
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
    }
    .nf-kicker {
      position: relative;
      font-family: var(--ff-mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 1rem;
    }
    .nf h1 {
      position: relative;
      font-family: var(--ff-display);
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--c-ink);
      margin-bottom: 1rem;
    }
    .nf h1 em { font-style: italic; color: var(--c-accent); }
    .nf p {
      position: relative;
      max-width: 30rem;
      color: var(--c-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .nf .btn { position: relative; }
  </style>
</head>
<body>
  <main class="nf">
    <span class="nf-mark" aria-hidden="true">404</span>
    <p class="nf-kicker">Error 404</p>
    <h1>This page <em>wandered off.</em></h1>
    <p>The link is broken or the page has moved. Let's get you back to the work that matters.</p>
    <a class="btn btn-primary" href="/">← Back to home</a>
  </main>
</body>
</html>
